<!DOCTYPE html>
<html>
<head>
    <title>get clickered :3</title>
</head>
<body>
    :3
<script>
    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = protocol + "//" + window.location.host + "/sub";
    const ws = new WebSocket(wsUrl);
    
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if(data.type == "click :3"){
            const audioElement = new Audio("sounds/click.mp3");
            audioElement.play();
        }
    };

</script>

</body>
</html>
